<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <script>
    (function () {
      const path = window.location.pathname;

      // redirect rules
      if (path === "/" || path === "/workspace") {
        window.location.replace("https://maze-development.com");
      } else {
        window.location.replace("https://maze-development.com");
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
